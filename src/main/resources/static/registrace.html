<!DOCTYPE html>
<html lang="cs" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">

    <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <title>GameHub - Registrace</title>
</head>
<body>

<header>
    <nav class="nav-left">
        <a href="obchod.html">GameHub</a>
    </nav>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <nav class="nav-center">
        <a href="obchod.html">Obchod</a>
        <a href="knihovna.html">Knihovna</a>
        <a href="podpora.html">Podpora</a>
        <a href="prihlaseni.html" class="mobile-login">Přihlásit se</a>
    </nav>

    <nav class="nav-right">
        <a href="kosik.html">🛒</a>
        <a href="prihlaseni.html">Přihlásit se</a>
    </nav>
</header>

<main>
    <div class="login-main">
        <h1 class="login-nadpis">Registrace</h1>
        <form class="login-form">
            <label for="username">Uživatelské jméno</label>
            <input type="text" id="username" name="username" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Heslo</label>
            <input type="password" id="password" name="password" required>

            <label for="password-confirm">Potvrzení hesla</label>
            <input type="password" id="password-confirm" name="password-confirm" required>

            <button type="submit">Vytvořit účet</button>
        </form>

        <div class="register-section">
            <p>Už máte účet?</p>
            <a href="prihlaseni.html" class="register-button">Přihlásit se</a>
        </div>
    </div>
</main>

<script src="script.js"></script>

</body>
</html>
